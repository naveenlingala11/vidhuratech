<div class="container mt-3">

  <h3>Students</h3>

  <table class="table table-bordered mt-3">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Batch</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let s of students">
        <td>{{ s.name }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.batch }}</td>
        <td>
          <span class="badge bg-success">Active</span>
        </td>
      </tr>
    </tbody>

  </table>

</div>
