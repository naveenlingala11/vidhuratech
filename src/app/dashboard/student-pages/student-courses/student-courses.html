<div class="course-card" *ngFor="let c of courses" (click)="openCourse(c.batchId)">

  <div class="course-header">
    <div>
      <h3>{{ c.courseName }}</h3>
      <small class="sub">Batch ID: {{ c.batchId }}</small>
    </div>

    <span class="badge">{{ c.progress }}%</span>
  </div>

  <div class="progress-bar">
    <div class="fill" [style.width.%]="c.progress"></div>
  </div>

  <button class="continue-btn" (click)="openCourse(c.batchId); $event.stopPropagation()">
    Continue Learning →
  </button>

</div>
