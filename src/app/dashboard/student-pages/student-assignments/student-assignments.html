<div class="container mt-3">

  <h3>Assignments</h3>

  <div *ngIf="assignments.length === 0" class="alert alert-info">
    No assignments available
  </div>

  <div class="card p-3 mt-3" *ngFor="let a of assignments">
    <h5>{{ a.title }}</h5>
    <p>Due: {{ a.dueDate }}</p>
    <span class="badge bg-warning">{{ a.status }}</span>
  </div>

</div>
