<div class="container mt-3">

  <h3>Certificates</h3>

  <div *ngIf="certificates.length === 0" class="alert alert-info">
    No certificates yet
  </div>

  <div class="card p-3 mt-3" *ngFor="let c of certificates">
    <h5>{{ c.name }}</h5>

    <button class="btn btn-success btn-sm mt-2">
      Download
    </button>
  </div>

</div>
