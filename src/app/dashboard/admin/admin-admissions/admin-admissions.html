<div class="admission-card">

    <h2>🎓 Manual Admission</h2>

    <div class="grid">

        <input [(ngModel)]="form.name" placeholder="Student Name">

        <input [(ngModel)]="form.email" placeholder="Email">

        <input [(ngModel)]="form.phone" placeholder="Phone">

        <select [(ngModel)]="form.batchId">

            <option value="">
                Select Batch
            </option>

            <option *ngFor="let b of batches" [value]="b.id">

                {{ b.name }}
            </option>

        </select>

        <input type="number" [(ngModel)]="form.amount" placeholder="Amount">

        <select [(ngModel)]="form.paymentMethod">

            <option>CASH</option>
            <option>UPI</option>
            <option>BANK_TRANSFER</option>

        </select>

        <select [(ngModel)]="form.paymentStatus">

            <option>PAID</option>
            <option>PENDING</option>
            <option>PARTIAL</option>

        </select>

    </div>

    <button (click)="submit()" [disabled]="loading">

        {{ loading ? 'Creating...' : 'Create Admission' }}

    </button>

</div>
