<nav class="breadcrumb" *ngIf="breadcrumbs.length">

  <span class="home-dot">
    <i class="bi bi-house"></i>
  </span>

  <ng-container *ngFor="let crumb of breadcrumbs; let last = last">

    <span class="separator" *ngIf="!last || breadcrumbs.length">/</span>

    <a *ngIf="!last" [routerLink]="crumb.url">
      {{ crumb.label }}
    </a>

    <span *ngIf="last" class="active">
      {{ crumb.label }}
    </span>

  </ng-container>

</nav>
