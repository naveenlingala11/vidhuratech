<div class="topbar">

  <div class="left">

    <div class="search-box">
      <i class="bi bi-search"></i>
      <input placeholder="Search modules, users, reports..." />
    </div>
  </div>

  <div class="right">
    <button class="icon-btn" type="button" (click)="toggleTheme()" title="Toggle theme">
      <i class="bi bi-moon-stars"></i>
    </button>

    <button class="icon-btn notification-btn" type="button" title="Notifications">
      <i class="bi bi-bell"></i>
      <span></span>
    </button>

    <div class="profile" (click)="$event.stopPropagation()">
      <button class="profile-btn" type="button" (click)="toggleProfile($event)">
        <div class="avatar">{{ getInitials() }}</div>

        <div class="profile-meta">
          <strong>{{ authService.getUser()?.name || 'User' }}</strong>
          <span>{{ authService.getUser()?.role || 'Member' }}</span>
        </div>

        <i class="bi bi-chevron-down caret"></i>
      </button>

      <div class="dropdown" *ngIf="profileOpen">
        <div class="dropdown-user">
          <div class="avatar large">{{ getInitials() }}</div>

          <div>
            <strong>{{ authService.getUser()?.name || 'User' }}</strong>
            <span>{{ authService.getUser()?.role || 'Member' }}</span>
          </div>
        </div>

        <button type="button" (click)="goToProfile()">
          <i class="bi bi-person-circle"></i>
          View Profile
        </button>

        <button type="button" class="logout" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
          Logout
        </button>
      </div>
    </div>
  </div>

</div>
