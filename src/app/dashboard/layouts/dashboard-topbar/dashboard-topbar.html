<div class="topbar">

  <!-- LEFT -->
  <div class="left">

    <div class="search-box">
      <span class="icon">🔍</span>
      <input placeholder="Search anything..." />
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- Theme Toggle -->
    <button class="icon-btn" (click)="toggleTheme()">🌓</button>

    <!-- Profile -->
    <div class="profile">

      <button class="avatar-btn" (click)="toggleProfile()">
        <div class="avatar">
          {{ getInitials() }}
        </div>
      </button>

      <!-- Dropdown -->
      <div class="dropdown" *ngIf="profileOpen">

        <div class="user-info">
          <strong>{{ authService.getUser()?.name }}</strong>
          <span>{{ authService.getUser()?.role }}</span>
        </div>

        <button (click)="goToProfile()">View Profile</button>
        <button (click)="logout()" class="logout">Logout</button>

      </div>

    </div>

  </div>

</div>
