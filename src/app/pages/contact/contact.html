<!-- HERO -->

<section class="contact-hero text-center text-white">

    <div class="container">

        <h1 class="display-5 fw-bold">
            Contact vidhura Tech
        </h1>

        <p class="lead">
            We are here to help you start your IT career
        </p>

    </div>

</section>



<!-- CONTACT SECTION -->

<section class="py-5">

    <div class="container">

        <div class="row g-4">

            <!-- CONTACT FORM -->

            <div class="col-md-6">

                <div class="card contact-card">

                    <div class="card-body">

                        <h4 class="mb-4">
                            Send Us a Message
                        </h4>

                        <form (ngSubmit)="submitContact()" #contactForm="ngForm">

                            <div class="mb-3">

                                <label>Full Name</label>

                                <input class="form-control" name="name" [(ngModel)]="contactData.name" required>

                            </div>

                            <div class="mb-3">

                                <label>Email</label>

                                <input class="form-control" name="email" [(ngModel)]="contactData.email" required>

                            </div>

                            <div class="mb-3">

                                <label>Phone</label>

                                <input class="form-control" name="phone" [(ngModel)]="contactData.phone" required>

                            </div>

                            <div class="mb-3">

                                <label>Message</label>

                                <textarea class="form-control" rows="4" name="message" [(ngModel)]="contactData.message"
                                    required></textarea>

                            </div>

                            <button class="btn btn-primary w-100" type="submit" [disabled]="contactForm.invalid">

                                Send Message

                            </button>

                        </form>

                    </div>

                </div>

            </div>



            <!-- CONTACT INFO -->

            <div class="col-md-6">

                <div class="contact-info">

                    <h4>
                        Contact Information
                    </h4>

                    <p>
                        Feel free to reach out for course details or demo class registration.
                    </p>

                    <hr>

                    <p>
                        <strong>Phone / WhatsApp</strong><br>
                        9108057464
                    </p>

                    <p>
                        <strong>Email</strong><br>
                        support@vidhuratech.com
                    </p>

                    <p>
                        <strong>Website</strong><br>
                        uptrixhub.online
                    </p>

                    <p>
                        <strong>Location</strong><br>
                        India (Online Training)
                    </p>

                </div>

            </div>

        </div>

    </div>

</section>



<!-- MAP -->

<section class="map-section">

    <iframe width="100%" height="350" style="border:0" loading="lazy" allowfullscreen
        src="https://maps.google.com/maps?q=india&t=&z=5&ie=UTF8&iwloc=&output=embed">
    </iframe>

</section>
