<div class="prep-container">
  <h1 class="title">🚀 Placement Preparation Hub</h1>
  <p class="subtitle">
    Crack top companies with structured interview preparation
  </p>

  <div class="company-grid">
    <div
      class="company-card"
      *ngFor="let company of companies"
      (click)="openCompany(company)"
    >
      <img [src]="company.logo" class="logo" />

      <div class="card-body">
        <h3>{{ company.name }}</h3>
        <p>{{ company.desc }}</p>

        <div class="tags">
          <span>Aptitude</span>
          <span>DSA</span>
          <span>HR</span>
        </div>
      </div>
    </div>
  </div>
</div>
