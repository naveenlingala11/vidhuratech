<div class="users-page">

    <div class="header">
        <h2>User Management</h2>
        <button (click)="openModal()">Create User</button>
    </div>

    <div class="filters">

        <input [(ngModel)]="search" (input)="onSearchChange()" placeholder="Search by name..." />

        <select [(ngModel)]="selectedRole" (change)="loadUsers()">
            <option value="">All Roles</option>
            <option *ngFor="let role of roles" [value]="role">
                {{ role }}
            </option>
        </select>

        <select [(ngModel)]="selectedStatus" (change)="loadUsers()">
            <option value="">All Status</option>
            <option value="ACTIVE">Active</option>
            <option value="INACTIVE">Inactive</option>
        </select>

    </div>

    <div class="table-wrapper">

        <table>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th width="420">Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let user of users">
                    <td>{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.phone }}</td>
                    <td>{{ user.role }}</td>

                    <td>
                        <span class="status" [ngClass]="user.active ? 'active' : 'inactive'">
                            {{ user.active ? 'Active' : 'Inactive' }}
                        </span>
                    </td>

                    <td>
                        <div class="action-buttons">

                            <button class="edit-btn" (click)="openEdit(user)">
                                Edit
                            </button>

                            <button class="toggle-btn" (click)="toggle(user)">
                                {{ user.active ? 'Deactivate' : 'Activate' }}
                            </button>

                            <button class="reset-btn" (click)="resetPassword(user)">
                                Reset Password
                            </button>

                            <button class="audit-btn" (click)="viewAuditLogs(user)">
                                Audit
                            </button>

                            <button class="delete-btn" (click)="delete(user)">
                                Delete
                            </button>

                        </div>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

    <div class="pagination">
        <button (click)="prevPage()">Prev</button>
        <span>Page {{ page + 1 }} / {{ totalPages }}</span>
        <button (click)="nextPage()">Next</button>
    </div>

</div>

<!-- CREATE MODAL -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()"></div>

<div class="user-modal" *ngIf="showModal">
    <h3>Create Internal User</h3>

    <input [(ngModel)]="form.name" placeholder="Full Name" />
    <input [(ngModel)]="form.email" placeholder="Email" />
    <input [(ngModel)]="form.phone" placeholder="Phone" />
    <input [(ngModel)]="form.password" type="password" placeholder="Password" />

    <select [(ngModel)]="form.role">
        <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
    </select>

    <div class="modal-actions">
        <button class="cancel-btn" (click)="closeModal()">Cancel</button>
        <button class="create-btn" (click)="createUser()" [disabled]="loading">
            {{ loading ? 'Creating...' : 'Create User' }}
        </button>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-backdrop" *ngIf="showEditModal" (click)="closeEditModal()"></div>

<div class="user-modal" *ngIf="showEditModal">
    <h3>Edit User</h3>

    <input [(ngModel)]="editForm.name" placeholder="Full Name" />
    <input [(ngModel)]="editForm.phone" placeholder="Phone" />

    <select [(ngModel)]="editForm.role">
        <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
    </select>

    <div class="modal-actions">
        <button class="cancel-btn" (click)="closeEditModal()">Cancel</button>
        <button class="create-btn" (click)="updateUser()">Update User</button>
    </div>
</div>
