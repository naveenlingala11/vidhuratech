<div class="list-container">
  <h2>Assessments</h2>
  <div
    class="assessment-card"
    *ngFor="let assessment of assessments">
    <h3>
      {{ assessment.title }}
    </h3>
    <p>
      {{ assessment.description }}
    </p>
    <div class="meta">
      <span>
        Total Marks:
        {{ assessment.totalMarks }}
      </span>
      <span>
        Duration:
        {{ assessment.durationMinutes }} mins
      </span>
    </div>
    <button
      (click)="startAssessment(assessment.id)">
      Start Assessment
    </button>
  </div>
</div>
