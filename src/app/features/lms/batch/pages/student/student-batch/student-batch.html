<div class="student-batches">

  <div class="page-header">
    <h2>My Learning Batches</h2>
    <p>Access your enrolled courses and recorded sessions</p>
  </div>

  <div *ngIf="batches.length > 0" class="batch-grid">

    <div class="batch-card" *ngFor="let batch of batches">

      <div class="batch-title">
        {{ batch.name }}
      </div>

      <div class="batch-meta">
        Batch ID: #{{ batch.id }}
      </div>

      <button
        class="open-btn"
        [routerLink]="['/dashboard/student/lms', batch.id]">
        Open Batch
      </button>

    </div>

  </div>

  <div *ngIf="batches.length === 0" class="empty-state">
    No enrolled batches found.
  </div>

</div>
