<div class="actions-page">

  <h2>⚡ Admin Actions</h2>
  <p class="subtitle">Quick access to all admin modules</p>

  <div class="grid">

    <div class="card" *ngFor="let m of modules" (click)="navigate(m.route)">
      <div class="icon">{{ m.icon }}</div>
      <div class="title">{{ m.title }}</div>
    </div>

  </div>

</div>
