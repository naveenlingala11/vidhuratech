<div class="bc-page">
  <div class="bc-card">
    <h2>Batch Communication Manager</h2>
    <p class="sub">Manage Zoom + WhatsApp links for payment success and reminders.</p>
    <div class="row">
      <label>Batch</label>
      <select [(ngModel)]="selectedBatchId" (change)="onBatchChange()">
        <option [ngValue]="null">Select batch</option>
        <option *ngFor="let b of batches" [ngValue]="b.id">{{ b.name }}</option>
      </select>
    </div>
    <div class="grid">
      <div class="row">
        <label>WhatsApp Group Link</label>
        <input [(ngModel)]="form.whatsappGroupLink" placeholder="https://chat.whatsapp.com/..." />
      </div>
      <div class="row">
        <label>Zoom Join Link *</label>
        <input [(ngModel)]="form.zoomJoinLink" placeholder="https://us06web.zoom.us/j/..." />
      </div>
      <div class="row">
        <label>Zoom Meeting ID *</label>
        <input [(ngModel)]="form.zoomMeetingId" placeholder="871 1437 5458" />
      </div>
      <div class="row">
        <label>Zoom Passcode</label>
        <input [(ngModel)]="form.zoomPasscode" placeholder="278110" />
      </div>
      <div class="row">
        <label>Zoom Time</label>
        <input [(ngModel)]="form.zoomTime" placeholder="07:30 PM IST" />
      </div>
      <div class="row">
        <label>Zoom Schedule</label>
        <input [(ngModel)]="form.zoomSchedule" placeholder="Every day till Jun 15, 2026" />
      </div>
      <div class="row full">
        <label>Zoom Calendar Link (.ics)</label>
        <input [(ngModel)]="form.zoomCalendarLink" placeholder="https://us06web.zoom.us/meeting/.../ics?..." />
      </div>
    </div>
    <div class="actions">
      <button class="soft" (click)="applySampleInvite()">Apply Sample Invite</button>
      <button class="primary" [disabled]="saving || loading" (click)="save()">
        {{ saving ? 'Saving...' : 'Save Communication' }}
      </button>
    </div>
    <div *ngIf="message" class="msg" [class.success]="messageType === 'success'" [class.error]="messageType === 'error'">
      {{ message }}
    </div>
  </div>
</div>
