<div class="create-user-card">

    <div class="header">
        <h3>👤 Create Employee</h3>
        <p>Invite employees and assign roles</p>
    </div>

    <div class="form-group">
        <label>Name *</label>
        <input [(ngModel)]="form.name" placeholder="Enter full name" />
    </div>

    <div class="form-group">
        <label>Email *</label>
        <input [(ngModel)]="form.email" placeholder="Enter email address" />
    </div>

    <div class="form-group">
        <label>Phone</label>
        <input [(ngModel)]="form.phone" placeholder="Enter phone number" />
    </div>

    <div class="form-group">
        <label>Role *</label>
        <select [(ngModel)]="form.role">
            <option value="">Select Role</option>
            <option *ngFor="let r of roles">{{ r }}</option>
        </select>
    </div>

    <button class="submit-btn" (click)="submit()" [disabled]="loading">

        <span *ngIf="!loading">Create & Send Invite</span>

        <span *ngIf="loading" class="spinner-wrap">
            <span class="spinner"></span>
            Sending...
        </span>

    </button>

</div>
